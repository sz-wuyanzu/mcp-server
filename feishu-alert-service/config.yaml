# ============================================================
# Feishu Alert Service 配置文件
# ============================================================
#
# 飞书凭证 (app_id / app_secret) 和 LLM 地址 (base_url / api_key)
# 自动从 Hermes 读取，无需在此配置。
# 如果 Hermes 未安装或未配置飞书，启动时会给出明确的错误提示。
#
# 只需要填写下面的 chats 列表，服务就能跑起来。
# ============================================================
# Hermes 数据目录
# 服务启动时会从这里读取飞书凭证（.env）和 LLM 配置（config.yaml）
# 默认读取环境变量 HERMES_HOME，不设则用 ~/.hermes
# Docker 部署时通过 compose 的 environment 设置，一般不需要在这里改
# hermes_home: "/hermes-data"
hermes_home: "/opt/data"
# 使用的模型名称（不填 = 跟 Hermes 主模型一致）
# 如果想用更便宜/更快的模型来跑摘要，在这里指定即可，
# base_url 和 api_key 仍然从 Hermes 读取。
# 示例: model: "glm-4-flash"
# 摘要和状态文件的存储目录
data_dir: "./data"
# ---- 全局默认参数（每个群可单独覆盖） ----
defaults:
  segment_interval: 10       # 每隔多少分钟做一次分段摘要
  report_cycle: 6            # 每 N 次分段摘要后发一次归总报告（归总间隔 = segment_interval × report_cycle）
  max_chars_per_fetch: 30000 # 单次拉取消息的字符上限，防止输入过长
# ---- 自定义提示词（直接在这里调整即可，不需要改代码） ----
segment_prompt: |
  你是一个运维告警分析助手。以下是最近一段时间的飞书群消息（包含告警和普通对话）。
  请提取并总结其中的告警信息。
  输出要求：
  - 按服务名分类，每个服务一行，格式：服务名 | 级别 | 次数 | URL | 简要描述
  - 忽略普通闲聊
  - 如果没有告警消息，只回复 无告警
  - 不遗漏关键信息，不超过 1000 字
  - 不要使用 markdown 语法（不要用 ** # ` 等符号）
report_prompt: |
  你是一个高级运维告警分析师。以下是过去一段时间内多个时间段的告警摘要。
  请将它们归总为一份完整的告警报告。
  输出格式要求（纯文本，不要使用 markdown 语法，不要用 ** # ` 等符号）：
  1. 第一行总结：共涉及 N 个服务，M 次告警
  2. 按服务分类列出，每个服务包含：
     - emoji + 服务名 + 次数
     - 事件等级：告警日志中的级别（如 ERROR、WARN 等）
     - 问题：简述告警内容
     - 关键字段：汇总 url 数据，如有敏感信息（如身份证、手机号、等等id字样要用***表示）
     - 原因分析：根据告警日志推断 url 所实现的功能，表达该类告警产生的原因，以及可能引发的风险
     - 解决方案：从高级java开发工程师兼高级全栈架构师的角度，分析并给出针对该类问题的具体可操作的排查步骤，和专业的修复建议方案
  3. 高频或严重问题用 🔴 标注，中等用 🟡，一般用 🟢
  4. 在所有服务告警列出之后，追加一段"本期综合评估"，包含以下内容：
     - 系统健康度：根据告警数量、等级分布、影响范围，给出一个整体健康评级（健康 / 亚健康 / 需关注 / 高风险），并用一句话说明判断依据
     - 趋势观察：如果能从告警内容中识别出反复出现或逐渐恶化的问题，指出趋势性风险
     - 重点优化项：挑出当前最值得投入精力解决的 1~3 个问题，说明优先级理由
     - 架构层建议：站在高级全栈架构师的视角，针对本期暴露的问题，从服务治理、容错机制、可观测性、数据一致性、性能瓶颈等维度，给出中长期改进方向（不限于当前告警本身，可以延伸到系统设计层面）
  5. 并在结尾处说明“如果对这条总结有疑问，可以回复这条消息，帮您深入分析这段告警事件！”之类的表达
  6. 如果所有摘要都是 无告警，只回复 本周期内无告
  7. 关键字加粗显示，按照影响等级打星评分（总共5星），全文超过 1499 字则分多条消息发送
  示例格式：
  共涉及 3 个服务，15 次告警
  🔴 cgm-open（9次）
  事件等级：ERROR
  问题：Kafka 消费失败，主键冲突 DuplicateKeyException
  关键字段：/login/{手机号}/system
  原因分析：上游数据重复推送，或消费者重试导致重复写入
  解决方案：检查上游数据源是否重复发送；消费端增加幂等校验
  🟡 cgm-user（4次）
  事件等级：ERROR
  问题：Redis 分布式锁获取失败
  关键字段：/login/{用户id}/system
  原因分析：并发请求过高或 Redis 连接池耗尽
  解决方案：检查 Redis 连接数和负载；优化锁粒度或增加重试间隔
  🟢 cgm-device（2次）
  事件等级：WARN
  问题：MQTT 连接状态异常，设备离线
  关键字段：/login/{设备id}/system
  原因分析：设备网络不稳定或 MQTT broker 连接数达上限
  解决方案：检查设备网络环境；确认 broker 连接数配置
  ——————————————
  本期综合评估
  系统健康度：亚健康
  本期告警集中在 cgm-open 服务，Kafka 消费层出现高频主键冲突，存在数据一致性风险，整体可用性尚可但稳定性不足。
  趋势观察：
  cgm-open 的 DuplicateKeyException 连续多个周期出现，说明上游推送或消费重试机制存在结构性缺陷，若不处理可能演变为数据错乱或消费积压。
  重点优化项：
  1. cgm-open Kafka 幂等消费改造（优先级最高，影响数据准确性）
  2. cgm-user Redis 连接池调优（中优先级，影响并发场景稳定性）
  微服务、架构层建议：
  - 消息消费侧建议引入幂等表或基于唯一业务键的 upsert 策略，从根本上消除重复写入
  - Redis 分布式锁建议评估是否可用 Redisson 看门狗机制替代手动续期，降低锁失效概率
  - 建议补充链路追踪（如 SkyWalking / OpenTelemetry），将告警与调用链关联，缩短定位耗时
  - MQTT 连接管理建议增加断线重连指数退避和连接池监控埋点
  如果对这条总结有疑问，可以回复这条消息，我来帮您深入分析具体的告警事件！
# ============================================================
# 监控的飞书群列表（必填，至少一个）
#
# chat_id: 在飞书群设置 → 群信息 → 群号 中获取
# name:    群显示名称（可选）
#          不填 → 自动从飞书获取群名，群名被修改后会自动同步
#          填了 → 使用你填的名称，不查飞书 API
# enabled: 是否启用（默认 true），设为 false 可临时关闭该群的摘要
# mention_all: 归总报告发送时是否 @所有人（默认 false）
#              开启后群里每个人都会收到通知提醒
# mention_users: 归总报告发送时 @ 指定的人（默认空列表，不 @）
#                填飞书 open_id（格式 ou_xxx），可填多个
#                获取方式：飞书管理后台 → 通讯录 → 用户详情 → open_id
#
# segment_interval / report_cycle 可以按群单独设置，
# 不填则使用上面 defaults 中的值。
#
# segment_interval: 每隔多少分钟拉一次群消息并用 LLM 生成分段摘要，
#                   摘要会追加到本地文件中积累。值越小，摘要越及时，
#                   但 LLM 调用越频繁。建议 5~30 分钟，最大 1440（24小时）。
#
# report_cycle:     每 N 次分段摘要后，把积累的所有摘要归总为一份完整报告，
#                   自动发送到飞书群里，发送后清空已积累的摘要。
#                   归总间隔 = segment_interval × report_cycle
#                   例如 segment_interval=10, report_cycle=6 → 每 60 分钟发一次报告
#                   建议 3~24，最大 100。过大会导致摘要积累过多被截断。
#
# 以上参数修改后需要重启服务生效。
# ============================================================
chats:
  - chat_id: "oc_cdabcd41e3fcb93511d6cefd446a7bae"
    name: ""
    enabled: true
    mention_all: false
    mention_users: []              # 不 @ 指定人。填 open_id 如: ["ou_xxx", "ou_yyy"]
    segment_interval: 1
    report_cycle: 3
    max_chars_per_fetch: 50000 # 单次拉取消息的字符上限，防止输入过长，优先级更高
  - chat_id: "oc_39e46890bc4ada08eb3a8d2c35a9d40d"
    name: ""
    enabled: true
    mention_all: false
    mention_users: []              # 不 @ 指定人。填 open_id 如: ["ou_xxx", "ou_yyy"]
    segment_interval: 10
    report_cycle: 6
    max_chars_per_fetch: 50000 # 单次拉取消息的字符上限，防止输入过长，优先级更高
  # - chat_id: "oc_yyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyy"
  #   name: ""
  #   segment_interval: 30
  #   report_cycle: 8
  #   max_chars_per_fetch: 30000 # 单次拉取消息的字符上限，防止输入过长，优先级更高